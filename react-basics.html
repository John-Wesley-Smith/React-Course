<!DOCTYPE html>
<html>
  <head>
    <title>React Basics</title>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev@8.6.4/external-library.js"></script>
    <!-- The above code is the way to load the js from another website-->

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <!-- The above two lines load the react external library
      Here we load from the supersimpledev. Because to control the version of React . To avoid issuse-->


    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- External library called babel-->
    <script type="text/babel">

      // div represent a container
      const div = (
        <div>
          <button>Hello</button>
          <p>paragraph of text</p>
        </div>
      );

      

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(div);
      // The above two code Helps to sets up React
    </script>
  </body>
</html>

<!--
  - The above code is the minimum amount of code to set up the react

  What is React?
    1. React is a exteranl library
      - It's a bunch of code that is outside our computer.
      - We can load this code on our website, and use it.
    2. React helps us create websites easier

  External Library:
    https://unpkg.com/supersimpledev@8.6.4/external-library.js => This code is called the external Library
    - code that is outside our computer
    - code that someone else wrote

  Why are ther 2 external libraries for React?
    - React can be used in different places like websites and mobile apps. So the creators of react decided to divide it into two external libraries.
    - React contain the shared details shared features that are use in both websites and mobile apps and react DOM which contain features that are specific to websites

    - Using React to create websites = load React and ReactDOM
    - Using React to create apps = load React & ReactNative  

  ReactDOM.createRoot() = sets up React
  reader means display something

  <!DOCTYPE html> tells the html to use the modern version

  What is Babel?
    - JavaScript compiler
    - Translates other languages into javaScript
  
  Why we need Bable?
    - When using React, we don't use normal javaScript. 
    - We use an enhanced version of JavaScript called JSX (JavaScript XML)
    - JavaScript XML = same as javascript, but we can write HTML directle in our javaScript code
  
  Example:
    using JSX
      const button = <button>Hello</button>;

    using JS DOM
      const button = document.createElement('button').innerHTML = 'Hello';
    
  Problem with JSX:
    - Our web browser doesn't understand JSX. It only understand normal js.
    - So need ot translate JSX into normal JavaScript
    - This can be acheived by babel library. it translate JSX into javascript
    - To use Babel we need to use two steps
      1. load the babel external library.
      2. we have to give the type = "text/babel" in script tag. This helps to translate the code to javascript
    
  Note: whatever we give inside the render. it will add in the js-container
    - Always pass the div in the render
  
  3 ways the react helps to create website easier:
    1. It's more natural.
    2. Find errors easier.
    3. We can insert JavaScript code into elements

  
-->
