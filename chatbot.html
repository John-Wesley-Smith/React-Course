<!DOCTYPE html>
<html>
  <head>
    <title>Chatbot</title>
    <style>
      body{
        font-family: Arial;
        margin-top: 0px;
        margin-bottom: 0px;
      }
      .send-button {
        background-color: rgb(25,135,84);
        color: white;
        padding: 12px 20px;
        margin-left: 10px;
        border: none;
        border-radius: 10px;
        font-size: 15px;
        cursor: pointer;
      }

      .chat-input{
        padding: 12px 15px;
        border-radius: 10px;
        border-width: 1px;
        font-size: 15px;
        flex-grow: 1;
      }

      .chat-input-container{
        display: flex;
        margin-bottom: 60px;
      }

      .app-container{
        max-width: 600px;
        margin-left: auto;
        margin-right: auto;
        height: 100vh; /*viewport height*/
        display: flex;
        flex-direction: column;
      }

      .chat-message-user{
        display: flex;
        justify-content: end;
        align-items: start;

      }

      .chat-message-robot{
        display: flex;
        align-items: start;
      }
      
      .chat-message-text{
        background-color: rgb(238, 238, 238);
        padding: 15px 20px;
        border-radius: 10px;
        margin-right: 10px;
        margin-left: 10px;
        margin-bottom: 20px;
        max-width: 300px;
      }

      .chat-message-profile{
        width: 45px;
      }

      .chat-messages-container{
        flex-grow: 1;
        margin-top: 20px;
        overflow: scroll;
        scrollbar-width: none;/* To remove the scroll bar */ 
      }

    </style>
  </head>
  <body>
    <div class="js-container"></div>

    <script src="https://unpkg.com/supersimpledev/react.js"></script>
    <script src="https://unpkg.com/supersimpledev/react-dom.js"></script>
    <!-- The above two lines load the react external library
      Here we load from the supersimpledev. Because to control the version of React . To avoid issuse-->

    <script src="https://unpkg.com/supersimpledev/chatbot.js"></script>
    <!-- Add the external library for chatbot-->


    <script src="https://unpkg.com/supersimpledev/babel.js"></script>
    <!-- External library called babel-->
    <script type="text/babel">

      function ChatInput({chatMessages, setChatMessages}) { // ChatInput is a component

        const [inputText, setInputText] = React.useState('');

        function saveInputText(event) {
          setInputText(event.target.value);
        }

        function sendMessage() {
          const newChatMessages = [
            ...chatMessages, // Spread Operator(...) = takes the values in an array, and copies them into a new array.
            {
              message: inputText,
              sender: 'user',
              id: crypto.randomUUID()
            }
          ]

          setChatMessages(newChatMessages);
          
          const response = Chatbot.getResponse(inputText)
          setChatMessages([
            ...newChatMessages, // Spread Operator(...) = takes the values in an array, and copies them into a new array.
            {
              message: response,
              sender: 'robot',
              id: crypto.randomUUID()
            }
          ]);
          
          

          setInputText('');
        }

        return (
          <div className="chat-input-container">
            <input 
              placeholder="Send a message to ChatBot" 
              size="30" 
              onChange={saveInputText}
              value = {inputText} // Controlled Input: used to make the input box empty after sending the message
              className="chat-input"
            /> 
            <button
              onClick={sendMessage}
              className="send-button"
            >Send</button>
          </div>
        )
      }

      function ChatMessage(props) {
        // const message = props.message;
        const {message} = props;// Shortcut for above
        const {sender} = props;
        // const {message, sender} = props; // This is also allowed

        /*
        if (sender === 'robot') {
            return(
            <div>
              <img src="images/robot.png" width="50"/>
              {message}
            </div>
          );
        }
        */ // The below is the shortcut of this code
       
        return(
          <div className={
            sender === 'user' ? 'chat-message-user' : 'chat-message-robot'
          }>
            {sender === 'robot' && (
              <img src="images/robot.png" className="chat-message-profile"/>
            )}
            <div className="chat-message-text">
            {message}
            </div>
            {sender === 'user' && (
              <img src="images/user.png" className="chat-message-profile"/>
            )}
          </div>
        );
      }

      function ChatMessages({chatMessages}) {

        const chatMessagesRef = React.useRef(null);

        React.useEffect(() => {
          const containerElem = chatMessagesRef.current;
          if(containerElem){
            containerElem.scrollTop = containerElem.scrollHeight;
          }
        }, [chatMessages]);

        return (
          <div className="chat-messages-container"
          ref={chatMessagesRef}>            
          
            {chatMessages.map((chatMessage) => {
              return (
                <ChatMessage
                  message={chatMessage.message}
                  sender={chatMessage.sender}
                  key={chatMessage.id}
                />
              );
            })}
          </div>
        );
      }

      // Usa a component to create the app
      function App() {

        const [chatMessages, setChatMessages] =  React.useState( [{
          message : 'Hello Chatbot',
          sender: 'user',
          id: 'id1'
        },{
          message: '"Hello! How can I help you?',
          sender: 'robot',
          id: 'id2'
        },{
          message : 'can you get me todays date?',
          sender: 'user',
          id: 'id3'
        },{
          message: 'Today is June 21',
          sender: 'robot',
          id: 'id4'
        }]);
        // if we use the 'const array' instead of 'const {chatMessages, setChatMessages}'. we can use the below code. In the code we also use shortcut(Array Destructuring)
        // const [chatMessages, setChatMessages] = array; // This is the shortcut of below two lines and called Array destructing. Note: order matters
        // const chatMessages = array[0]; // The first value(array[0]) give the current data of ChatMessage. 
        // const setChatMessages = array[1]; // The second value(array[1]) is the function that updates the data
        

        return (
          <div className="app-container">
            
            <ChatMessages 
              chatMessages = {chatMessages} // This is the naming convention
            />
            <ChatInput 
              chatMessages = {chatMessages}
              setChatMessages = {setChatMessages}
            />
          </div>
        );
      }
      

      const container = document.querySelector('.js-container');
      ReactDOM.createRoot(container).render(<App/>);
      // The above two code Helps to sets up React
    </script>
  </body>
</html>

<!--
  Components:
    - Component is a piece of the website
    - To create a component use the function.
  
  When Building websites:
    - It's better to split up the website into pieces.
    - So we can work on a small piece of the website at a time
  
  Note:
    - The component name must start with capital letter.
    - This is called PascalCase (each word starts with a capital letter: (ex) CharInput)
  
  - In JSX, input must have closing tag
    - *All elements need a closing tag.
    - <input /> // shortcut for <input></input> if Nothing inside in input element
    - The above is called self-closing element
  
  - {ChatInput()} This helps the run the function
  - {ChatInput()} and <ChatInput></ChatInput> both do the same thing
  - <ChatInput></ChatInput> this have a great advantage. It look like html element. we can thing like, we're creating our own HTML element
  - By using this we can create our own HTML element
  - The self-closing element shortcut is <ChatInput />

  Fragment:
    - React have a another way to group a element called Fragment(<></>)
    - Group elements together, without creating an extra <div>
    - By using fragment we can remove the word div. And have simply ( <> opening tag and </> closing tag)
    - This helps to avoid extra div.

  size attribute:
    - size attribute defines how may character can fi in the <input> tag
    - character = a letter(abc), number(123), or symbol(!@#).

  Note: <div> is a block element( take up an entire line by itself)
        In React, we still use <div> for layout purposes

  Props:
    - Every component get one parameter called props
    - The props parameter is an object and it contains all the attributes that we give to the component.
    - props make our component reusable
    - props is the short of properties
    - To access the attribute : 
      - syntax : props.attribute_name
      - ex : props.message;
      - const {message} = props; // This is the shorcut of (const message = props.message;) 
      - This shortcut is called Destructing

  Note: 
      function ChatMessage(props) {
        const {message} = props; // Shortcut 
        const {sender} = props;
        // const {message, sender} = props; // This is also allowed

        return(
          <div>
            {message}
            <img src="images/user.png" width="50"/>
          </div>
        );
      }

    // We can also use like the parameter below

      function ChatMessage({ message, sender }) {

        return(
          <div>
            {message}
            <img src="images/user.png" width="50"/>
          </div>
        );
      }

  if Statement in JSX (Gaurd Operator):
    - here we can't use the if statement in JSX, But we can use the Gaurd Operator(&&)

    ex: const res = value1 && value2;
      - if value1 is true, the result will be value2.
      - This works just like an if-statement
    ex: {sender === 'robot' && <img src="images/robot.png" width="50"/>}
      - if sender is a 'robot' then the img will be showed otherwise not 
    
  Best Practice:
    Use a component (App) to create the website
    - React lets us work on a small piece of the website at a time
  
  Object = groups related values together

  map() function lets us go through each value of an array and convert it into a new value

  Key prop:
      - In react, if we insert a array of components, we need to give each component a prop called key.
      - The key helps react track changes in the array. So we should give each component a key
      - key should be unique

  Event Handles
    - Event handles runs a function when we interact with the website
    - onClick is a Event and sendMessage is the Event Handler
    - event prop must use camelCase(ex: onClick)
    - here we should not use the brackets to run the function. ex: {sendMessage}

  - crypto.randomUUID() - helps to generate a unique Id string every we run the code
  
  State:
      - State is the data that is connected to the HTML.
      - When we update this data, it will update the HTML
      - We use state to save data that changes over time.
        ex: if convert the chat message into state, when we update chat messages, it will update the HTML
      - We can done using React.useState()
      ex: const array = React.useState()
          - We get to values from the array
          - The first value(array[0]) give the current data of ChatMessage.
          - The second value(array[1]) is the function that updates the data. This is also known as updater function
          - In React, we should not update the data directly using .push() , we always use the array[1] function to update the data.
          - If we update the data directly React will not update the HTML. If we use the function(array[1]) to update teh data, React will update the HTML
          - The way that this updator function works is it replace the entire chat Messages array with a new array

  Note:
      - In React, we should not modifu the data directly.
      - We should always create a copy, and then modify the copy.
      - (This helps React be more efficient).
  
  Spread Operator(...)
    - Takes the values in an array, and copies them into a new array.
    - ex: [...chatMessages]
  
  React Best Practice:
    - Do not use the DOM manually ( React is managing the website)
  
  onChange event:
    - Runs a function when we change the text inside an <input> tag
  
  event.target = gives us the element that we're typing in

  Visualize the components in our App ( component tree):
          <APP>
    ________|___________
    |                   |
    |                   |
    <CharInput>     <ChatMessages>
                        |
                        |
                    {chatMessages, setChatMessages}
  
    Here {chatMessages, ChatMessage} locate under teh <ChatMessages> we have to uplift the state up to the <App> components
    
    Lifting the State Up = share state between multiple components

  - Using {} we can save any type of value inside a prop
  - chatMessages = {chatMessages} // This is the naming convention

  className:
      In React, we use className to set class
        - React is JavaScript code
        - JavaScript already has a feature called class.
        - class is a reserved word. So we can not use

    1. Create container around elements
    2. Add display: flex to container.
    3. Use flexbox features.

    - controls how the elements are displayed vertically

  Hooks:
    - insert React feaures into our component.
    - React.useState is a hook
    React Hooks: (Note: every hook starts with the word 'use')
      - useState()
      - useEffect() (it run some code after the component is created or updated)
      - useRef()
    - Put hooks at the top of the component(Hooks should not be inside anything).
    
    useEffect()
      - it run some code after the component is created or updated.
      - have two parameter.
      - 1st parameter is the function.
      - 2nd paramenter is have the array. [](empty array) only run once, after the component is created
      ex: React.useEffect(() => {
          console.log('update')
        }, [chatMessages]);
        - here [chatMessages] run this funciton every time chatMessages changes.
        - This is an dependency Array = control when useEffect runs
        Best Pratice: give useEffect a dependency array to avoid ruuning too often
    
    useRef():
      - To get the html element in React use the Hooks, useRef()
      - useRef() automatically save an HTML element from the component.
      - It create a ref. a ref is an container with special React features
